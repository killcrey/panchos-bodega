<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Vault | The Invisible Panchos</title>
    <style>
      body { 
        background-color: #111; 
        color: #fff; 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        padding: 2rem; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        min-height: 80vh;
        text-align: center;
      }
      h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
      p { color: #aaa; font-size: 0.9rem; line-height: 1.5; margin-bottom: 2rem; }
      
      #download-box { 
        background: #222; 
        padding: 2.5rem 2rem; 
        border: 1px solid #444; 
        border-radius: 8px; 
        width: 100%; 
        max-width: 400px; 
      }
      
      /* The spinning radar to show the bouncer is thinking */
      .loader { 
        border: 4px solid #333; 
        border-top: 4px solid #00ffcc; 
        border-radius: 50%; 
        width: 40px; 
        height: 40px; 
        animation: spin 1s linear infinite; 
        margin: 0 auto 1.5rem auto; 
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      .btn { 
        display: block; 
        width: 100%; 
        padding: 1rem; 
        background: #00ffcc; 
        color: #111; 
        text-decoration: none; 
        font-weight: bold; 
        border-radius: 4px; 
        text-transform: uppercase; 
        box-sizing: border-box;
      }
      .error-text { color: #ff4444; }
    </style>
  </head>
  <body>
    <div id="download-box">
      <div id="status-area">
        <div class="loader"></div>
        <h2>Verifying Receipt...</h2>
        <p>The bouncer is checking your credentials with the bank. Do not close this window.</p>
      </div>
    </div>

    <script type="module" src="/success.js"></script>
  </body>
</html>
